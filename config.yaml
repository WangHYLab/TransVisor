# Transcriptome Visualization Agent Configuration

# API Configuration
# Note: For security, api.key should be stored in config-local.yaml
api:
  key: ""  # Do not store real API key here, use config-local.yaml instead
  model: "deepseek-chat"
  base_url: "https://api.deepseek.com"
  timeout: 60

# Data Configuration
data:
  default_path: "example_data/example_expression.csv"
  diff_expr_path: "example_data/differential_expression.csv"
  time_series_path: "example_data/time_series.csv"

# Visualization Configuration
visualization:
  default_dpi: 300
  default_style: "seaborn"
  default_palette: "viridis"
  output_dir: "output"

# Agent Configuration
agent:
  max_iterations: 10
  verbose: true